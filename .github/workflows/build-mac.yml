name: Build macOS App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-create-dmg
          restore-keys: ${{ runner.os }}-brew-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-WebKit pyobjc-framework-Quartz

      - name: Build Mac app with PyInstaller
        run: |
          pyinstaller _build/build_mac.spec --clean --noconfirm --distpath dist

      - name: Verify build
        run: |
          if [ ! -d "dist/CVToposheet.app" ]; then
            echo "ERROR: CVToposheet.app not found in dist/"
            exit 1
          fi
          echo "Build OK: $(du -sh dist/CVToposheet.app | cut -f1)"

      - name: Create DMG installer
        run: |
          brew install create-dmg
          create-dmg \
            --volname "CV-Toposheet" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "CVToposheet.app" 200 190 \
            --hide-extension "CVToposheet.app" \
            --app-drop-link 600 185 \
            "CVToposheet_Mac.dmg" \
            "dist/"

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: CVToposheet_Mac.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG as artifact (manual runs)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: CVToposheet_Mac
          path: CVToposheet_Mac.dmg
          retention-days: 7
