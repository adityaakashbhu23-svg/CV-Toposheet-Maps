name: Build macOS App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-WebKit

      - name: Build Mac app with PyInstaller
        run: |
          pyinstaller _build/build_mac.spec --clean --noconfirm

      - name: Create DMG installer
        run: |
          brew install create-dmg
          create-dmg \
            --volname "CV-Toposheet" \
            --volicon "_build/app_icon.ico" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "CVToposheet.app" 200 190 \
            --hide-extension "CVToposheet.app" \
            --app-drop-link 600 185 \
            "CVToposheet_Mac.dmg" \
            "dist/"

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: CVToposheet_Mac.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG as artifact (manual runs)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: CVToposheet_Mac
          path: CVToposheet_Mac.dmg
          retention-days: 7
